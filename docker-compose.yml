services:
  db:
    image: postgres:16-alpine
    container_name: kanban-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: kanban
      POSTGRES_PASSWORD: kanban
      POSTGRES_DB: kanban
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kanban"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: kanban-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://kanban:kanban@db:5432/kanban
      JWT_SECRET: ${JWT_SECRET:-change_this_secret_in_production}
      PORT: 3000
    ports:
      - "3000:3000"

volumes:
  pgdata:
